<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Receptionist Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk/dist/index.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }

    h1 { font-size: 22px; color: #1e293b; margin-bottom: 8px; }
    p  { font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.5; }

    #call-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    #call-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    #call-btn:active { transform: translateY(0); }
    #call-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #call-btn.active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    #status {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
      min-height: 20px;
    }

    .pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🏥</div>
    <h1>AI Receptionist</h1>
    <p>Talk to our AI receptionist. Ask about appointments, services, hours, or anything else.</p>
    <button id="call-btn" onclick="toggleCall()">Start Call</button>
    <div id="status"></div>
  </div>

  <script>
    const client = new RetellWebClient();
    let inCall = false;

    client.on("call_started",  () => setStatus("Connected — say hello!", false));
    client.on("call_ended",    () => endCallUI());
    client.on("error",         (e) => { setStatus("Error: " + e.message, false); endCallUI(); });

    async function toggleCall() {
      if (inCall) {
        client.stopCall();
        return;
      }
      startCallUI();
      try {
        const res = await fetch("/create-call", { method: "POST" });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        await client.startCall({ accessToken: data.access_token });
      } catch (err) {
        setStatus("Could not connect. Please try again.", false);
        endCallUI();
      }
    }

    function startCallUI() {
      inCall = true;
      const btn = document.getElementById("call-btn");
      btn.textContent = "End Call";
      btn.classList.add("active");
      btn.disabled = false;
      setStatus("Connecting...", true);
    }

    function endCallUI() {
      inCall = false;
      const btn = document.getElementById("call-btn");
      btn.textContent = "Start Call";
      btn.classList.remove("active");
      btn.disabled = false;
      setStatus("Call ended.", false);
      setTimeout(() => setStatus("", false), 3000);
    }

    function setStatus(msg, pulse) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = pulse ? "pulse" : "";
    }
  </script>
</body>
</html>
