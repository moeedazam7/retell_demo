<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aria — AI Receptionist</title>
  <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk/dist/index.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 52px 44px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 12px 48px rgba(99,102,241,0.10);
    }

    .avatar-wrap {
      position: relative;
      width: 88px;
      margin: 0 auto 24px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid white;
    }

    .badge {
      display: inline-block;
      background: #f0fdf4;
      color: #16a34a;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    h1 { font-size: 24px; color: #1e293b; margin-bottom: 6px; font-weight: 700; }
    .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    p  { font-size: 14px; color: #64748b; margin-bottom: 36px; line-height: 1.6; }

    #call-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      letter-spacing: 0.01em;
    }

    #call-btn:hover  { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.3); }
    #call-btn:active { transform: translateY(0); }
    #call-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #call-btn.active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 6px 20px rgba(239,68,68,0.3);
    }

    #status {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
      min-height: 20px;
    }

    .pulse { animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 28px 0;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .feature {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar">🏥</div>
      <div class="status-dot"></div>
    </div>
    <div class="badge">● Online</div>
    <h1>Aria</h1>
    <div class="subtitle">AI Medical Receptionist</div>
    <hr class="divider">
    <p>Ask about appointments, insurance, opening hours, directions, or any general enquiries.</p>
    <button id="call-btn" onclick="toggleCall()">🎙 Start Call</button>
    <div id="status"></div>
    <hr class="divider">
    <div class="features">
      <span class="feature">✦ Appointments</span>
      <span class="feature">✦ Insurance</span>
      <span class="feature">✦ Hours &amp; Directions</span>
    </div>
  </div>

  <script>
    const client = new RetellWebClient();
    let inCall = false;

    client.on("call_started",  () => setStatus("Connected — say hello!", false));
    client.on("call_ended",    () => endCallUI());
    client.on("error",         (e) => { setStatus("Error: " + e.message, false); endCallUI(); });

    async function toggleCall() {
      if (inCall) { client.stopCall(); return; }
      startCallUI();
      try {
        const res = await fetch("/create-call", { method: "POST" });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        await client.startCall({ accessToken: data.access_token });
      } catch (err) {
        setStatus("Could not connect. Please try again.", false);
        endCallUI();
      }
    }

    function startCallUI() {
      inCall = true;
      const btn = document.getElementById("call-btn");
      btn.textContent = "⏹ End Call";
      btn.classList.add("active");
      btn.disabled = false;
      setStatus("Connecting...", true);
    }

    function endCallUI() {
      inCall = false;
      const btn = document.getElementById("call-btn");
      btn.innerHTML = "🎙 Start Call";
      btn.classList.remove("active");
      btn.disabled = false;
      setStatus("Call ended.", false);
      setTimeout(() => setStatus("", false), 3000);
    }

    function setStatus(msg, pulse) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = pulse ? "pulse" : "";
    }
  </script>
</body>
</html>
